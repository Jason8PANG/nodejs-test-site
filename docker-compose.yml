version: '3.8'

services:
  nodejs-test-site:
    build: .
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    restart: unless-stopped
    container_name: nodejs-test-site
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
